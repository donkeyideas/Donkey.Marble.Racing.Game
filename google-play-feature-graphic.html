<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; }

.feature-graphic {
  width: 1024px;
  height: 500px;
  background: linear-gradient(135deg, #0a1a3a 0%, #0d2350 40%, #1a3a7a 70%, #0a1a3a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Decorative marble trails */
.trail {
  position: absolute;
  border-radius: 50%;
  opacity: 0.15;
}
.trail-1 { width: 600px; height: 600px; border: 3px solid #ffc220; top: -200px; left: -100px; }
.trail-2 { width: 400px; height: 400px; border: 2px solid #6ec1ff; bottom: -150px; right: -50px; }
.trail-3 { width: 300px; height: 300px; border: 2px solid #2ecc71; top: 50px; right: 200px; opacity: 0.1; }

/* Decorative marbles */
.marble {
  position: absolute;
  border-radius: 50%;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
.m1 { width: 60px; height: 60px; background: radial-gradient(circle at 35% 30%, #ff6b6b, #e74c3c, #8b0000); top: 40px; left: 60px; }
.m2 { width: 45px; height: 45px; background: radial-gradient(circle at 35% 30%, #a8e6ff, #6ec1ff, #2980b9); bottom: 60px; left: 180px; }
.m3 { width: 55px; height: 55px; background: radial-gradient(circle at 35% 30%, #ffdd57, #ffc220, #e6a800); top: 80px; right: 80px; }
.m4 { width: 40px; height: 40px; background: radial-gradient(circle at 35% 30%, #7dffb3, #2ecc71, #1a8a4a); bottom: 50px; right: 150px; }
.m5 { width: 35px; height: 35px; background: radial-gradient(circle at 35% 30%, #c8a8ff, #9b59b6, #6a1a8a); top: 200px; left: 30px; }
.m6 { width: 50px; height: 50px; background: radial-gradient(circle at 35% 30%, #ffe0a8, #ff9f43, #d35400); bottom: 120px; right: 40px; }

/* Speed lines */
.speed-line {
  position: absolute;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,194,32,0.3), transparent);
  border-radius: 2px;
}
.sl1 { width: 200px; top: 150px; left: 100px; transform: rotate(-5deg); }
.sl2 { width: 150px; top: 300px; right: 100px; transform: rotate(3deg); }
.sl3 { width: 180px; bottom: 100px; left: 250px; transform: rotate(-2deg); }

.content {
  text-align: center;
  z-index: 10;
  position: relative;
}

.title {
  font-family: 'Lilita One', cursive;
  font-size: 72px;
  color: #ffc220;
  text-shadow: 0 4px 20px rgba(255,194,32,0.4), 0 2px 0 #b8860b;
  letter-spacing: 2px;
  line-height: 1.1;
}

.subtitle {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 28px;
  color: rgba(255,255,255,0.85);
  margin-top: 12px;
  letter-spacing: 1px;
}

.tagline {
  font-family: 'Fredoka', sans-serif;
  font-weight: 400;
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  margin-top: 8px;
}

/* Gold accent line */
.accent-line {
  width: 120px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #ffc220, transparent);
  margin: 16px auto 0;
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="feature-graphic">
  <div class="trail trail-1"></div>
  <div class="trail trail-2"></div>
  <div class="trail trail-3"></div>

  <div class="marble m1"></div>
  <div class="marble m2"></div>
  <div class="marble m3"></div>
  <div class="marble m4"></div>
  <div class="marble m5"></div>
  <div class="marble m6"></div>

  <div class="speed-line sl1"></div>
  <div class="speed-line sl2"></div>
  <div class="speed-line sl3"></div>

  <div class="content">
    <div class="title">DONKEY MARBLE<br>RACING</div>
    <div class="subtitle">BET. RACE. WIN.</div>
    <div class="tagline">8 Marbles • 96 Tracks • Endless Action</div>
    <div class="accent-line"></div>
  </div>
</div>
</body>
</html>
